[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fuzz = { runs = 1000 }

[rpc_endpoints]
megaeth_mainnet = "${MEGAETH_RPC_URL}"
megaeth_testnet = "https://carrot.megaeth.com/rpc"

[etherscan]
megaeth_blockscout = { key = "${BLOCKSCOUT_API_KEY}", url = "https://megaeth.blockscout.com/api" }
megaeth_etherscan  = { key = "${ETHERSCAN_API_KEY}",  url = "https://mega.etherscan.io/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
